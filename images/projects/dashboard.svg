  <rect x="270" y="326" width="315" height="238" rx="18" fill="rgba(255,255,255,.05)"/>
  <rect x="605" y="326" width="315" height="238" rx="18" fill="rgba(255,255,255,.05)"/>
  <rect x="298" y="356" width="210" height="14" rx="7" fill="rgba(255,255,255,.14)"/>
